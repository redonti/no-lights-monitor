name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/redonti/no-lights-monitor
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'cmd/api/**'
              - 'internal/**'
              - 'web/**'
              - 'Dockerfile.api'
              - 'go.mod'
              - 'go.sum'
            worker:
              - 'cmd/worker/**'
              - 'internal/**'
              - 'Dockerfile.worker'
              - 'go.mod'
              - 'go.sum'
            bot:
              - 'cmd/bot/**'
              - 'internal/**'
              - 'Dockerfile.bot'
              - 'go.mod'
              - 'go.sum'
            outage:
              - 'cmd/outage/**'
              - 'internal/**'
              - 'Dockerfile.outage'
              - 'go.mod'
              - 'go.sum'
            graph-service:
              - 'graph-service/**'
            dtek:
              - 'dtek-service/**'

  build:
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build context
        id: ctx
        run: |
          case "${{ matrix.service }}" in
            graph-service)
              echo "dockerfile=graph-service/Dockerfile" >> $GITHUB_OUTPUT
              echo "context=./graph-service" >> $GITHUB_OUTPUT
              ;;
            dtek)
              echo "dockerfile=dtek-service/Dockerfile" >> $GITHUB_OUTPUT
              echo "context=./dtek-service" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "dockerfile=Dockerfile.${{ matrix.service }}" >> $GITHUB_OUTPUT
              echo "context=." >> $GITHUB_OUTPUT
              ;;
          esac

      - uses: docker/build-push-action@v6
        with:
          context: ${{ steps.ctx.outputs.context }}
          file: ${{ steps.ctx.outputs.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: [changes, build]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in manifests
        run: |
          SERVICES='${{ needs.changes.outputs.services }}'
          for service in $(echo "$SERVICES" | jq -r '.[]'); do
            sed -i "s|${{ env.IMAGE_PREFIX }}/$service:.*|${{ env.IMAGE_PREFIX }}/$service:sha-${{ github.sha }}|g" k8s/$service.yaml
            echo "Updated k8s/$service.yaml to sha-${{ github.sha }}"
          done

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git diff --cached --quiet || git commit -m "ci: update images to sha-${{ github.sha }}"
          git push
