apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot
  namespace: nolights
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bot
  template:
    metadata:
      labels:
        app: bot
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: bot
          image: ghcr.io/redonti/no-lights-monitor/bot:sha-3a55552515abedc7b123f704b12151a1c046ccf3
          imagePullPolicy: Always
          securityContext:
            capabilities:
              add: ["NET_RAW"]
          ports:
            - containerPort: 8081
              name: metrics
          env:
            - name: TZ
              value: Europe/Kyiv
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nolights-db
                  key: DATABASE_URL
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: nolights-secret
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: nolights-secret
                  key: RABBITMQ_PASS
            - name: RABBITMQ_URL
              value: amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@rabbitmq:5672/
            - name: BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nolights-secret
                  key: BOT_TOKEN
            - name: BASE_URL
              valueFrom:
                secretKeyRef:
                  name: nolights-secret
                  key: BASE_URL
            - name: OUTAGE_SERVICE_URL
              value: http://outage:8090
            - name: TELEGRAM_CHAT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nolights-secret
                  key: TELEGRAM_CHAT_USERNAME
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
