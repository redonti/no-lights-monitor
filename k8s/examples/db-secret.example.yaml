# Database credentials — managed separately from the app secret.
# 1. Copy to db-secret.yaml and fill in real values
# 2. kubectl apply -f k8s/db-secret.yaml
# 3. Never commit db-secret.yaml (it is gitignored)
#
# Pre-requisite: create the role and database in CNPG first:
#   kubectl exec -n database -it app-db-1 -- psql -U postgres
#   CREATE ROLE nolights WITH LOGIN PASSWORD 'your-password';
#   CREATE DATABASE nolights OWNER nolights;
apiVersion: v1
kind: Secret
metadata:
  name: nolights-db
  namespace: nolights
type: Opaque
stringData:
  host: app-db-rw.database.svc.cluster.local
  port: "5432"
  dbname: nolights
  username: nolights
  password: <DB_PASSWORD>
  sslmode: disable
  DATABASE_URL: postgres://nolights:<DB_PASSWORD>@app-db-rw.database.svc.cluster.local:5432/nolights?sslmode=disable
