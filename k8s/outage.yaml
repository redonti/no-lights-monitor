apiVersion: v1
kind: Service
metadata:
  name: outage
  namespace: nolights
spec:
  selector:
    app: outage
  ports:
    - port: 8090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outage
  namespace: nolights
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outage
  template:
    metadata:
      labels:
        app: outage
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: outage
          image: ghcr.io/redonti/no-lights-monitor/outage:sha-712f9b6f150a574bc72c7b4afec06b3ea635b7e0
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          env:
            - name: TZ
              value: Europe/Kyiv
            - name: OUTAGE_PORT
              value: "8090"
            - name: OUTAGE_FETCH_INTERVAL
              value: "900"
