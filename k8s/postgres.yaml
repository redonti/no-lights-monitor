apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: nolights
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
  clusterIP: None  # Headless — stable DNS for StatefulSet pod
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: nolights
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: nolights-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nolights-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: nolights
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
