# Apply with real values — never commit this file with actual secrets.
# Fill in each <placeholder> before applying:
#   kubectl apply -f k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: nolights-secret
  namespace: nolights
type: Opaque
stringData:
  # PostgreSQL
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: <POSTGRES_PASSWORD>
  DATABASE_URL: postgres://postgres:<POSTGRES_PASSWORD>@postgres:5432/nolights?sslmode=disable

  # Redis
  REDIS_PASSWORD: <REDIS_PASSWORD>
  REDIS_URL: redis://:<REDIS_PASSWORD>@redis:6379/0

  # RabbitMQ
  RABBITMQ_USER: nolights
  RABBITMQ_PASS: <RABBITMQ_PASS>

  # Telegram
  BOT_TOKEN: <BOT_TOKEN>
  TELEGRAM_BOT_USERNAME: <TELEGRAM_BOT_USERNAME>
  TELEGRAM_CHAT_USERNAME: <TELEGRAM_CHAT_USERNAME>

  # Admin UI
  ADMIN_LOGIN: <ADMIN_LOGIN>
  ADMIN_PASSWORD: <ADMIN_PASSWORD>

  # Public URL
  DOMAIN: lights.spatki.xyz
  BASE_URL: https://lights.spatki.xyz
